<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五運六氣查詢系統 (1927-2026)</title>
    <style>
        /* 基礎樣式設定 */
        body {
            font-family: "Noto Serif TC", "Songti TC", "Source Han Serif TC", "MingLiU", serif;
            background-color: #f4f1ea;
            color: #333;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 16px;
            box-sizing: border-box;
        }

        /* 容器樣式 */
        .container {
            max-width: 896px;
            width: 100%;
            background-color: #ffffff;
            padding: 32px;
            border-radius: 12px;
            box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
            border: 1px solid #e7e5e4;
            box-sizing: border-box;
        }

        h1 {
            font-size: 1.875rem;
            font-weight: 700;
            text-align: center;
            margin-bottom: 32px;
            margin-top: 0;
            color: #292524;
        }

        /* 網格佈局 */
        .grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 24px;
        }

        @media (min-width: 768px) {
            .grid {
                grid-template-columns: repeat(12, 1fr);
            }
            .col-year { grid-column: span 3; }
            .col-wuyun { grid-column: span 4; }
            .col-feature { grid-column: span 5; }
        }

        /* 方格通用樣式 */
        .flex-col {
            display: flex;
            flex-direction: column;
        }

        .label-tag {
            background-color: #8b7355;
            color: white;
            padding: 2px 10px;
            border-radius: 4px;
            font-size: 0.875rem;
            margin-bottom: 8px;
            display: inline-block;
            align-self: flex-start;
        }

        .content-box {
            background-color: #fafaf9;
            border: 2px solid #e7e5e4;
            border-radius: 8px;
            padding: 24px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            min-height: 120px;
            box-sizing: border-box;
        }

        /* 年份輸入格 */
        .input-wrapper {
            padding: 16px;
            align-items: center;
        }

        input[type="number"] {
            font-size: 2.25rem;
            font-weight: 700;
            text-align: center;
            background: transparent;
            width: 100%;
            border: none;
            color: #44403c;
            font-family: inherit;
        }

        input:focus {
            outline: none;
        }

        .helper-text {
            font-size: 0.75rem;
            text-align: center;
            margin-top: 8px;
            color: #78716c;
        }

        /* 五運六氣格 */
        #wuYunResult {
            font-size: 1.25rem;
            font-weight: 700;
            line-height: 1.625;
            text-align: center;
            color: #44403c;
            margin: 0;
        }

        .text-accent {
            font-size: 1.5rem;
            color: #78350f;
        }

        /* 運氣特點格 */
        #featureBox {
            justify-content: flex-start;
            overflow-y: auto;
            max-height: 300px;
        }

        #featureResult {
            color: #57534e;
            line-height: 1.625;
        }

        #featureResult p {
            margin: 0 0 16px 0;
        }

        #featureResult p:last-child {
            margin-bottom: 0;
        }

        /* 底部資訊 */
        .footer {
            margin-top: 32px;
            text-align: center;
            color: #a8a29e;
            font-size: 0.875rem;
            font-style: italic;
            border-top: 1px solid #f5f5f4;
            padding-top: 16px;
        }

        /* 自訂滾動條 */
        #featureBox::-webkit-scrollbar {
            width: 6px;
        }
        #featureBox::-webkit-scrollbar-thumb {
            background-color: #d1cbc0;
            border-radius: 10px;
        }
    </style>
</head>
<body>

    <div class="container">
        <h1>五運六氣查詢系統</h1>
        
        <div class="grid">
            <!-- 年份格 -->
            <div class="col-year flex-col">
                <span class="label-tag">查詢年份</span>
                <div class="content-box input-wrapper">
                    <input type="number" id="yearInput" min="1927" max="2026" value="2026">
                </div>
                <p class="helper-text">輸入任何年份 e.g.2026</p>
            </div>

            <!-- 五運六氣格 -->
            <div class="col-wuyun flex-col">
                <span class="label-tag">五運六氣</span>
                <div class="content-box">
                    <p id="wuYunResult"></p>
                </div>
            </div>

            <!-- 運氣特點格 -->
            <div class="col-feature flex-col">
                <span class="label-tag">運氣特點</span>
                <div class="content-box" id="featureBox">
                    <div id="featureResult"></div>
                </div>
            </div>
        </div>

        <div class="footer">
            資料來源：五運六氣完整詳細總結表
        </div>
    </div>

    <script>
        const stems = ["甲", "乙", "丙", "丁", "戊", "己", "庚", "辛", "壬", "癸"];
        const branches = ["子", "丑", "寅", "卯", "辰", "巳", "午", "未", "申", "酉", "戌", "亥"];
        
        const siTianMap = {
            "子": "少陰君火", "午": "少陰君火",
            "丑": "太陰濕土", "未": "太陰濕土",
            "寅": "少陽相火", "申": "少陽相火",
            "卯": "陽明燥金", "酉": "陽明燥金",
            "辰": "太陽寒水", "戌": "太陽寒水",
            "巳": "厥陰風木", "亥": "厥陰風木"
        };

        const zaiQuanMap = {
            "子": "陽明燥金", "午": "陽明燥金",
            "丑": "太陽寒水", "未": "太陽寒水",
            "寅": "厥陰風木", "申": "厥陰風木",
            "卯": "少陰君火", "酉": "少陰君火",
            "辰": "太陰濕土", "戌": "太陰濕土",
            "巳": "少陽相火", "亥": "少陽相火"
        };

        const daYunMap = {
            "甲": "土運太過", "己": "土運不及",
            "乙": "金運不及", "庚": "金運太過",
            "丙": "水運太過", "辛": "水運不及",
            "丁": "木運不及", "壬": "木運太過",
            "戊": "火運太過", "癸": "火運不及"
        };

        function getFortuneData(year) {
            const stemIdx = (year - 4) % 10;
            const branchIdx = (year - 4) % 12;
            
            const stem = stems[stemIdx];
            const branch = branches[branchIdx];
            const stemBranch = stem + branch;
            
            const siTian = siTianMap[branch];
            const zaiQuan = zaiQuanMap[branch];
            const daYun = daYunMap[stem];

            const wuYun = `<span class="text-accent">${stemBranch}年</span><br><br>${stem}為${daYun.slice(0,2)}（${daYun}）<br>${siTian}司天<br>${zaiQuan}在泉`;

            let features = [];
            
            // 上半年分析
            let firstHalfNote = `○ 該年為「${siTian}」司天，上半年氣候以${siTian.slice(2)}主事，易見${siTian.includes('火') ? '暑熱' : siTian.includes('水') ? '寒冷' : siTian.includes('金') ? '清燥' : siTian.includes('木') ? '風動' : '濕滯'}。`;
            if (daYun.includes("太過")) {
                firstHalfNote += ` 受「${daYun.slice(0,2)}」之強勢影響，氣候多見其運氣屬性之特徵。`;
            } else {
                firstHalfNote += ` 由於「${daYun.slice(0,2)}」不及，司天之氣影響更為明顯。`;
            }
            features.push(firstHalfNote);

            // 下半年分析
            features.push(`○ 下半年由「${zaiQuan}」在泉主導，${zaiQuan.slice(2)}之氣流行，影響秋冬氣候。`);
            
            // 總體分析
            let summary = "";
            if (daYun.includes("水")) summary = "全年水氣偏盛，寒氣與他氣交爭，氣候偏寒且冷熱變換明顯。";
            else if (daYun.includes("火")) summary = "全年火氣偏旺，炎暑流行，需注意溫燥之氣。";
            else if (daYun.includes("木")) summary = "全年風氣大行，氣候多變且動而不居。";
            else if (daYun.includes("金")) summary = "全年燥氣偏盛，氣候趨於乾燥、清涼。";
            else summary = "全年濕氣較重，氣候多見陰雨潮濕，土氣偏厚。";

            features.push(`○ 總體而言，${summary}`);

            return {
                wuYun: wuYun,
                features: features
            };
        }

        const yearInput = document.getElementById('yearInput');
        const wuYunResult = document.getElementById('wuYunResult');
        const featureResult = document.getElementById('featureResult');

        function updateDisplay() {
            const year = parseInt(yearInput.value);
            if (year < 1900 || isNaN(year)) {
                wuYunResult.innerHTML = "請輸入有效年份";
                featureResult.innerHTML = "目前數據支援較廣範圍的干支推算。";
                return;
            }

            const data = getFortuneData(year);
            wuYunResult.innerHTML = data.wuYun;
            featureResult.innerHTML = data.features.map(f => `<p>${f}</p>`).join('');
        }

        yearInput.addEventListener('input', updateDisplay);

        window.onload = () => {
            updateDisplay();
        };
    </script>
</body>
</html>
