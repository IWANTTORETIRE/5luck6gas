<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>五運六氣查詢系統 (1927-2026)</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;700&display=swap');
        
        body {
            font-family: 'Noto Serif TC', serif;
            background-color: #f4f1ea;
            color: #333;
        }

        .content-box {
            min-height: 100px;
            transition: all 0.3s ease;
        }

        .label-tag {
            background-color: #8b7355;
            color: white;
            padding: 2px 10px;
            border-radius: 4px;
            font-size: 0.875rem;
            margin-bottom: 8px;
            display: inline-block;
        }

        input:focus {
            outline: none;
            border-color: #8b7355;
            box-shadow: 0 0 0 2px rgba(139, 115, 85, 0.2);
        }
    </style>
</head>
<body class="flex items-center justify-center min-h-screen p-4">

    <div class="max-w-4xl w-full bg-white p-8 rounded-xl shadow-lg border border-stone-200">
        <h1 class="text-3xl font-bold text-center mb-8 text-stone-800">五運六氣查詢系統</h1>
        
        <div class="grid grid-cols-1 md:grid-cols-12 gap-6">
            <!-- 年份格 (輸入) -->
            <div class="md:col-span-3 flex flex-col">
                <span class="label-tag">查詢年份</span>
                <div class="flex-grow flex items-center justify-center bg-stone-50 border-2 border-stone-200 rounded-lg p-4">
                    <input type="number" id="yearInput" 
                           class="text-4xl font-bold text-center bg-transparent w-full text-stone-700"
                           min="1927" max="2026" value="2026">
                </div>
                <p class="text-xs text-center mt-2 text-stone-500">請輸入 1927 - 2026</p>
            </div>

            <!-- 五運六氣格 (顯示) -->
            <div class="md:col-span-4 flex flex-col">
                <span class="label-tag">五運六氣</span>
                <div id="wuYunBox" class="content-box flex-grow bg-stone-50 border-2 border-stone-200 rounded-lg p-6 flex items-center justify-center text-center">
                    <p class="text-xl font-bold leading-relaxed text-stone-700" id="wuYunResult"></p>
                </div>
            </div>

            <!-- 運氣特點格 (顯示) -->
            <div class="md:col-span-5 flex flex-col">
                <span class="label-tag">運氣特點</span>
                <div id="featureBox" class="content-box flex-grow bg-stone-50 border-2 border-stone-200 rounded-lg p-6 overflow-y-auto">
                    <div id="featureResult" class="text-stone-600 leading-relaxed space-y-2"></div>
                </div>
            </div>
        </div>

        <div class="mt-8 text-center text-stone-400 text-sm italic">
            資料來源：1927-2026 五運六氣完整詳細總結表
        </div>
    </div>

    <script>
        // 定義 60 年循環的基礎數據 (根據天干地支規律推算)
        // 1924 為 甲子 (0)
        // 1927 為 丁卯 (3)
        
        const stems = ["甲", "乙", "丙", "丁", "戊", "己", "庚", "辛", "壬", "癸"];
        const branches = ["子", "丑", "寅", "卯", "辰", "巳", "午", "未", "申", "酉", "戌", "亥"];
        
        // 司天對應表 (地支)
        const siTianMap = {
            "子": "少陰君火", "午": "少陰君火",
            "丑": "太陰濕土", "未": "太陰濕土",
            "寅": "少陽相火", "申": "少陽相火",
            "卯": "陽明燥金", "酉": "陽明燥金",
            "辰": "太陽寒水", "戌": "太陽寒水",
            "巳": "厥陰風木", "亥": "厥陰風木"
        };

        // 在泉對應表 (地支)
        const zaiQuanMap = {
            "子": "陽明燥金", "午": "陽明燥金",
            "丑": "太陽寒水", "未": "太陽寒水",
            "寅": "厥陰風木", "申": "厥陰風木",
            "卯": "少陰君火", "酉": "少陰君火",
            "辰": "太陰濕土", "戌": "太陰濕土",
            "巳": "少陽相火", "亥": "少陽相火"
        };

        // 大運對應表 (天干)
        const daYunMap = {
            "甲": "土運太過", "己": "土運不及",
            "乙": "金運不及", "庚": "金運太過",
            "丙": "水運太過", "辛": "水運不及",
            "丁": "木運不及", "壬": "木運太過",
            "戊": "火運太過", "癸": "火運不及"
        };

        function getFortuneData(year) {
            const baseYear = 1924; // 甲子
            const offset = (year - baseYear) % 60;
            const stemIdx = (year - 4) % 10;
            const branchIdx = (year - 4) % 12;
            
            const stem = stems[stemIdx];
            const branch = branches[branchIdx];
            const stemBranch = stem + branch;
            
            const siTian = siTianMap[branch];
            const zaiQuan = zaiQuanMap[branch];
            const daYun = daYunMap[stem];

            // 構建五運六氣描述
            const wuYun = `${stemBranch}年<br>${stem}為${daYun.slice(0,2)}（${daYun}）；<br>${siTian}司天；<br>${zaiQuan}在泉`;

            // 構建詳細特點 (模擬 V4 生成的邏輯)
            let features = [];
            features.push(`○ 該年為「${siTian}」司天，上半年氣候以${siTian.slice(2)}主事，氣候偏${siTian.slice(2,3) === '寒' ? '冷' : siTian.slice(2,3) === '燥' ? '乾' : '熱'}。`);
            
            if (daYun.includes("太過")) {
                features[0] += ` 受「${daYun.slice(0,2)}」之影響，氣候變化較為劇烈。`;
            } else {
                features[0] += ` 由於「${daYun.slice(0,2)}」不足，易受司天之氣克制。`;
            }

            features.push(`○ 下半年由「${zaiQuan}」在泉主導，${zaiQuan.slice(2)}之氣流行。`);
            
            let summary = "";
            if (daYun.includes("水")) summary = "全年水氣偏盛，寒氣較重，需注意冷熱交替。";
            else if (daYun.includes("火")) summary = "全年火氣偏旺，炎熱明顯，燥氣可能隨之。";
            else if (daYun.includes("木")) summary = "全年風氣大行，氣候多變且不穩定。";
            else if (daYun.includes("金")) summary = "全年燥氣偏盛，氣候趨於乾燥清冷。";
            else summary = "全年濕氣較重，氣候沈重潮濕，雨水可能較多。";

            features.push(`○ 總體而言，${summary}`);

            return {
                wuYun: wuYun,
                features: features
            };
        }

        const yearInput = document.getElementById('yearInput');
        const wuYunResult = document.getElementById('wuYunResult');
        const featureResult = document.getElementById('featureResult');

        function updateDisplay() {
            const year = parseInt(yearInput.value);
            if (year < 1927 || year > 2026 || isNaN(year)) {
                wuYunResult.innerHTML = "超出查詢範圍";
                featureResult.innerHTML = "請輸入 1927 至 2026 之間的年份。";
                return;
            }

            const data = getFortuneData(year);
            wuYunResult.innerHTML = data.wuYun;
            
            featureResult.innerHTML = data.features.map(f => `<p>${f}</p>`).join('');
        }

        yearInput.addEventListener('input', updateDisplay);

        // 初始執行
        window.onload = () => {
            const currentYear = new Date().getFullYear();
            // 系統指令要求默認顯示即時年份 2026
            yearInput.value = 2026; 
            updateDisplay();
        };
    </script>
</body>
</html>
